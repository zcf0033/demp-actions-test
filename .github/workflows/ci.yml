name: CI+CD 完整流水线（构建+测试+自动部署）
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # 没有 cache: 'npm'，避免锁文件报错

      - name: 构建项目（模拟）
        run: |
          npm config set registry https://registry.npmmirror.com
          npm init -y
          mkdir -p dist
          echo "<h1>Mock Deployment</h1>" > dist/index.html
          # 不需要 npm install 和 npm run build

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
