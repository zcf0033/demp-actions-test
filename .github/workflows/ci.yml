name: CI+CD 完整流水线（构建+测试+自动部署）
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置 Node 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'          # 可选，加速依赖安装

      - name: 构建项目（国内镜像加速）
        run: |
          npm config set registry https://registry.npmmirror.com
          npm ci                  # 更严格的依赖安装，需 package-lock.json
          npm test                # 运行测试（如果项目有）
          npm run build

      - name: 部署到 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # 如果需要保留历史提交记录，可以加：keep_files: false
