name: 面试用 CI 流程（构建+测试）
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 打印系统信息
        run: |
          echo "系统：$(uname -a)"

      - name: 配置Node环境
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 初始化项目并安装依赖（配置国内淘宝镜像）
        run: |
          npm config set registry https://registry.npmmirror.com
          npm init -y
          npm install

      - name: 模拟自动化测试
        run: echo "✅ 单元测试全部通过"
